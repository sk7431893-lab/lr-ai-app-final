<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LR AI - Video Generation</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body{background:#050816;color:white;margin:0;font-family:sans-serif;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState } = React;

function App() {
  const [page, setPage] = useState("landing");

  return (
    <div style={{minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:"20px"}}>
      <h1 style={{fontSize:"3rem", fontWeight:"900", color:"#22d3ee"}}>LR AI</h1>
      <p style={{color:"#94a3b8"}}>Video Generation Platform</p>
      <button
        onClick={function(){ setPage("dashboard"); }}
        style={{padding:"12px 32px", background:"linear-gradient(135deg,#06b6d4,#a855f7)", border:"none", borderRadius:"12px", color:"white", fontWeight:"700", cursor:"pointer", fontSize:"1rem"}}
      >
        Enter Dashboard
      </button>
      {page === "dashboard" && (
        <div style={{marginTop:"20px", padding:"20px", border:"1px solid rgba(34,211,238,0.3)", borderRadius:"16px"}}>
          <p style={{color:"#22d3ee", fontWeight:"700"}}>Dashboard Loaded Successfully!</p>
          <button onClick={function(){ setPage("landing"); }} style={{marginTop:"10px", padding:"8px 20px", background:"rgba(255,255,255,0.1)", border:"1px solid rgba(255,255,255,0.2)", borderRadius:"8px", color:"white", cursor:"pointer"}}>Back</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
