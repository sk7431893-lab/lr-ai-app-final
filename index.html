<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{font-family:'Inter',sans-serif;box-sizing:border-box;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#050816;}
::-webkit-scrollbar-thumb{background:rgba(34,211,238,0.3);border-radius:10px;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes progress-bar{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
.animate-float{animation:float 3s ease-in-out infinite;}
.animate-fadeUp{animation:fadeUp 0.5s ease forwards;}
.animate-spin{animation:spin 1s linear infinite;}
.glass{background:rgba(255,255,255,0.03);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);}
.neon-border{border:1px solid rgba(34,211,238,0.3);box-shadow:0 0 20px rgba(34,211,238,0.1);}
.input-style{background:#070b1f;border:1px solid rgba(255,255,255,0.1);color:white;outline:none;transition:all 0.3s;}
.input-style:focus{border-color:rgba(34,211,238,0.5);box-shadow:0 0 0 3px rgba(34,211,238,0.1);}
.card-hover:hover{transform:translateY(-4px);}
</style>
</head>

  {id:2,title:"Neon Samurai",category:"Cinematic",duration:"5s",ratio:"9:16",

  {id:3,title:"Frozen Throne",category:"Epic",duration:"10s",ratio:"1:1",

   video:"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4",gradient:"from-blue-500/30 to-indigo-600/30"},
  {id:4,title:"Desert Storm",category:"Action",duration:"5s",ratio:"16:9",
   thumbnail:"https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=800&q=80",
   video:"https://www.w3schools.com/html/mov_bbb.mp4",gradient:"from-rose-500/30 to-amber-600/30"},
];

const INITIAL_USERS=[
  {id:1,email:"lrai@owner.com",password:"lrai2024",name:"LR AI Owner",role:"owner",plan:"owner",videosLeft:Infinity,totalVideos:0},
  {id:2,email:"demo@test.com",password:"demo123",name:"Demo User",role:"user",plan:"trial",videosLeft:3,totalVideos:0},

        <span style={{color:"white",fontWeight:900,fontSize:size*0.38,letterSpacing:"-1px"}}>LR</span>

}

      <div style={{background:"rgba(0,0,0,0.6)",backdropFilter:"blur(8px)",borderRadius:10,padding:"5px 10px",border:"1px solid rgba(34,211,238,0.3)",display:"flex",alignItems:"center",gap:6}}>
        <div style={{width:16,height:16,background:"linear-gradient(135deg,#22d3ee,#a855f7)",borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{color:"white",fontWeight:900,fontSize:8}}>LR</span>

function LandingPage({onLogin,onRegister}){
  return(
    <div className="min-h-screen" style={{background:"#050816"}}>
      <div className="fixed inset-0 pointer-events-none overflow-hidden">
        <div style={{position:"absolute",top:"-10%",left:"-10%",width:"50vw",height:"50vw",background:"radial-gradient(circle,rgba(34,211,238,0.12),transparent 60%)",borderRadius:"50%"}}/>
        <div style={{position:"absolute",top:"-5%",right:"-10%",width:"45vw",height:"45vw",background:"radial-gradient(circle,rgba(168,85,247,0.1),transparent 60%)",borderRadius:"50%"}}/>
        <div className="absolute inset-0" style={{backgroundImage:"radial-gradient(rgba(34,211,238,0.025) 1px,transparent 1px)",backgroundSize:"40px 40px"}}/>
      </div>
      <nav className="relative flex items-center justify-between px-8 py-5 border-b border-white/5">

        <div className="flex items-center gap-3">
          <button onClick={onLogin} className="px-5 py-2.5 rounded-xl border border-white/10 text-slate-300 text-sm font-medium hover:bg-white/5 transition">Sign In</button>
          <button onClick={onRegister} className="px-5 py-2.5 rounded-xl text-white text-sm font-semibold" style={{background:"linear-gradient(135deg,#06b6d4,#3b82f6,#a855f7)"}}>Get Started Free</button>

      <div className="relative max-w-6xl mx-auto px-6 pt-20 pb-16 text-center">

          <div className="w-1.5 h-1.5 rounded-full bg-cyan-400 animate-pulse"/>
          AI-Powered Cinematic Video Generation
        </div>
        <h1 className="text-5xl md:text-7xl font-black mb-6 leading-tight text-white">
          Create Stunning<br/>
          <span style={{background:"linear-gradient(135deg,#22d3ee,#3b82f6,#a855f7,#ec4899)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
            Cinematic Videos
          </span><br/>with AI
        </h1>
        <p className="text-slate-400 text-lg max-w-2xl mx-auto mb-10">
          Real AI video generation powered by <span className="text-cyan-300 font-semibold">Kling AI v1.6</span> via secure backend proxy.
        </p>
        <div className="flex flex-col sm:flex-row gap-4 justify-center mb-16">
          <button onClick={onRegister} className="px-8 py-4 rounded-2xl text-white font-bold text-base" style={{background:"linear-gradient(135deg,#06b6d4,#3b82f6,#a855f7)",boxShadow:"0 0 30px rgba(34,211,238,0.3)"}}>🎬 Start Creating Free</button>
          <button onClick={onLogin} className="px-8 py-4 rounded-2xl border border-white/10 text-slate-300 font-semibold text-base hover:bg-white/5 transition">Sign In →</button>

              <h3 className="text-xl font-black text-white mb-1">{plan.name}</h3>

                {plan.features.map(f=>(
                  <li key={f} className="flex items-center gap-2 text-sm text-slate-300"><span className="text-cyan-400 text-xs">✓</span>{f}</li>

              <button onClick={plan.id==="trial"?onRegister:()=>{}} className="w-full py-3 rounded-xl text-sm font-semibold"

function AuthModal({mode,onClose,onSuccess,users,setUsers}){
  const [tab,setTab]=useState(mode);
  const [name,setName]=useState("");
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [card,setCard]=useState("");
  const [expiry,setExpiry]=useState("");
  const [cvv,setCvv]=useState("");
  const [step,setStep]=useState(1);
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);

  const handleLogin=()=>{
    setError("");
    const found=users.find(u=>u.email===email&&u.password===pass);
    if(!found){setError("Invalid email or password.");return;}
    setLoading(true);
    setTimeout(()=>{setLoading(false);onSuccess(found);},800);
  };

  const handleRegStep1=()=>{
    setError("");
    if(!name.trim()||!email.trim()||!pass.trim()){setError("All fields required.");return;}
    if(users.find(u=>u.email===email)){setError("Email already registered.");return;}
    if(pass.length<6){setError("Min 6 character password.");return;}
    setStep(2);
  };

  const handleRegStep2=()=>{
    setError("");
    if(!card.trim()||!expiry.trim()||!cvv.trim()){setError("All payment fields required.");return;}
    if(card.replace(/\s/g,"").length<16){setError("Invalid card number.");return;}
    setLoading(true);
    setTimeout(()=>{
      const nu={id:Date.now(),email,password:pass,name,role:"user",plan:"trial",videosLeft:3,totalVideos:0};
      setUsers(prev=>[...prev,nu]);
      setLoading(false);
      onSuccess(nu);
    },1200);
  };

  return(
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:"rgba(0,0,0,0.85)",backdropFilter:"blur(12px)"}}>
      <div className="glass neon-border rounded-3xl p-8 w-full max-w-md relative animate-fadeUp" style={{background:"rgba(5,8,22,0.97)"}}>
        <button onClick={onClose} className="absolute top-5 right-5 text-slate-400 hover:text-white text-xl">✕</button>
        <div className="text-center mb-7">
          <LRLogo size={40} className="justify-center mb-4"/>
          {tab==="login"
            ?<><h2 className="text-2xl font-black text-white">Welcome Back</h2><p className="text-slate-400 text-sm mt-1">Sign in to LR AI</p></>
            :step===1
              ?<><h2 className="text-2xl font-black text-white">Create Account</h2><p className="text-slate-400 text-sm mt-1">3 free videos to start</p></>
              :<><h2 className="text-2xl font-black text-white">Payment Details</h2><p className="text-slate-400 text-sm mt-1">No charge now</p></>
          }
        </div>
        <div className="flex rounded-xl border border-white/10 overflow-hidden mb-6">
          <button onClick={()=>{setTab("login");setError("");}} className={`flex-1 py-2.5 text-sm font-semibold transition ${tab==="login"?"bg-gradient-to-r from-cyan-500/30 to-blue-500/30 text-white":"text-slate-400"}`}>Sign In</button>
          <button onClick={()=>{setTab("register");setStep(1);setError("");}} className={`flex-1 py-2.5 text-sm font-semibold transition ${tab==="register"?"bg-gradient-to-r from-cyan-500/30 to-blue-500/30 text-white":"text-slate-400"}`}>Register</button>
        </div>
        {tab==="login"?(
          <div className="space-y-4">
            <div><label className="text-xs text-slate-400 mb-1.5 block">Email</label>
              <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" className="input-style w-full px-4 py-3 rounded-xl text-sm"/></div>
            <div><label className="text-xs text-slate-400 mb-1.5 block">Password</label>
              <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" className="input-style w-full px-4 py-3 rounded-xl text-sm"/></div>
            {error&&<div className="bg-red-500/10 border border-red-500/30 rounded-xl px-4 py-3 text-red-300 text-sm">{error}</div>}
            <button onClick={handleLogin} disabled={loading} className="w-full py-3.5 rounded-xl text-white font-bold disabled:opacity-60" style={{background:"linear-gradient(135deg,#06b6d4,#3b82f6,#a855f7)"}}>
              {loading?<span className="flex items-center justify-center gap-2"><div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"/>Signing in...</span>:"Sign In"}
            </button>
            <div className="text-center text-xs text-slate-500">Demo: <span className="text-cyan-400 cursor-pointer" onClick={()=>{setEmail("demo@test.com");setPass("demo123");}}>demo@test.com / demo123</span></div>
          </div>
        ):step===1?(
          <div className="space-y-4">
            <div><label className="text-xs text-slate-400 mb-1.5 block">Full Name</label>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your Name" className="input-style w-full px-4 py-3 rounded-xl text-sm"/></div>
            <div><label className="text-xs text-slate-400 mb-1.5 block">Email</label>
              <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" className="input-style w-full px-4 py-3 rounded-xl text-sm"/></div>
            <div><label className="text-xs text-slate-400 mb-1.5 block">Password</label>
              <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Min 6 characters" className="input-style w-full px-4 py-3 rounded-xl text-sm"/></div>
            {error&&<div className="bg-red-500/10 border border-red-500/30 rounded-xl px-4 py-3 text-red-300 text-sm">{error}</div>}
            <button onClick={handleRegStep1} className="w-full py-3.5 rounded-xl text-white font-bold" style={{background:"linear-gradient(135deg,#06b6d4,#3b82f6,#a855f7)"}}>Continue →</button>
          </div>
        ):(
          <div className="space-y-4">
            <div className="bg-amber-400/8 border border-amber-400/25 rounded-xl px-4 py-3 text-amber-300 text-xs text-center">🔒 Card required for activation. No charge now.</div>
            <div><label className="text-xs text-slate-400 mb-1.5 block">Card Number</label>
              <input value={card} onChange={e=>{let v=e.target.value.replace(/\D/g,"").slice(0,16);v=v.replace(/(.{4})/g,"$1 ").trim();setCard(v);}} placeholder="1234 5678 9012 3456" className="input-style w-full px-4 py-3 rounded-xl text-sm" maxLength={19}/></div>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="text-xs text-slate-400 mb-1.5 block">Expiry</label>
                <input value={expiry} onChange={e=>{let v=e.target.value.replace(/\D/g,"").slice(0,4);if(v.length>=2)v=v.slice(0,2)+"/"+v.slice(2);setExpiry(v);}} placeholder="MM/YY" className="input-style w-full px-4 py-3 rounded-xl text-sm" maxLength={5}/></div>
              <div><label className="text-xs text-slate-400 mb-1.5 block">CVV</label>
                <input type="password" value={cvv} onChange={e=>setCvv(e.target.value.replace(/\D/g,"").slice(0,3))} placeholder="•••" className="input-style w-full px-4 py-3 rounded-xl text-sm" maxLength={3}/></div>
            </div>
            {error&&<div className="bg-red-500/10 border border-red-500/30 rounded-xl px-4 py-3 text-red-300 text-sm">{error}</div>}
            <button onClick={handleRegStep2} disabled={loading} className="w-full py-3.5 rounded-xl text-white font-bold disabled:opacity-60" style={{background:"linear-gradient(135deg,#06b6d4,#3b82f6,#a855f7)"}}>
              {loading?<span className="flex items-center justify-center gap-2"><div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"/>Activating...</span>:"🎬 Activate Free Trial"}
            </button>
            <button onClick={()=>{setStep(1);setError("");}} className="w-full text-slate-400 text-sm hover:text-white">← Back</button>
          </div>
        )}
      </div>
    </div>
  );
}

function UpgradeModal({onClose,onUpgrade}){
  const [selected,setSelected]=useState("standard");
  const [card,setCard]=useState("");
  const [expiry,setExpiry]=useState("");
  const [cvv,setCvv]=useState("");
  const [step,setStep]=useState(1);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const paidPlans=PLANS.filter(p=>p.id!=="trial");
  const handlePay=()=>{
    setError("");
    if(!card.trim()||!expiry.trim()||!cvv.trim()){setError("All fields required.");return;}
    setLoading(true);
    setTimeout(()=>{setLoading(false);onUpgrade(selected);},1500);
  };
  return(
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:"rgba(0,0,0,0.9)",backdropFilter:"blur(12px)"}}>
      <div className="glass neon-border rounded-3xl p-8 w-full max-w-2xl relative animate-fadeUp" style={{background:"rgba(5,8,22,0.97)"}}>
        <button onClick={onClose} className="absolute top-5 right-5 text-slate-400 hover:text-white text-xl">✕</button>
        <div className="text-center mb-8"><LRLogo size={36} className="justify-center mb-4"/>
          <h2 className="text-2xl font-black text-white">Upgrade Plan</h2></div>
        {step===1?(
          <>
            <div className="grid grid-cols-3 gap-4 mb-6">
              {paidPlans.map(plan=>(
                <div key={plan.id} onClick={()=>setSelected(plan.id)}
                  className={`rounded-2xl p-5 border cursor-pointer transition-all ${selected===plan.id?"border-cyan-400/50 bg-cyan-400/8":"border-white/10 hover:border-white/20"}`}>
                  <div className={`inline-block px-2 py-0.5 rounded-full text-[10px] font-bold text-white mb-3 bg-gradient-to-r ${plan.badgeColor}`}>{plan.badge}</div>
                  <h3 className="text-base font-black text-white mb-1">{plan.name}</h3>
                  <div className="text-lg font-black mb-3" style={{background:"linear-gradient(135deg,#22d3ee,#a855f7)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{plan.price}</div>
                  {selected===plan.id&&<div className="text-xs text-cyan-300 font-semibold">✓ Selected</div>}
                </div>
              ))}
            </div>
            <button onClick={()=>setStep(2)} className="w-full py-3.5 rounded-xl text-white font-bold" style={{background:"linear-gradient(135deg,#06b6d4,#3b82f6,#a855f7)"}}>Continue →</button>
          </>
        ):(
          <div className="max-w-sm mx-auto space-y
