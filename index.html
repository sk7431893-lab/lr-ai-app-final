<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LrAI Video Studio - Create Real AI Videos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; }
        .gradient-text { background: linear-gradient(90deg, #7c3aed, #a855f7, #ec4899); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .progress-bar { height: 6px; background: linear-gradient(90deg, #10b981, #22d3ee); border-radius: 3px; transition: width 0.3s ease; }
        .grid-bg { background-size: 20px 20px; background-image: linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px); }
    </style>
</head>
<body class="min-h-screen grid-bg overflow-x-hidden">
    <div id="root">
        <!-- App will render here -->
    </div>

    <script>
        // Hardcoded data for demo
        const DEMO_VIDEOS = [
            { title: "Mountain Sunrise", category: "Nature", duration: "10s", ratio: "16:9", thumbnail: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80", video: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" },
            { title: "Cyberpunk City", category: "Sci‑Fi", duration: "8s", ratio: "16:9", thumbnail: "https://images.unsplash.com/photo-1485827404703-7s-926158f252b?w=800&q=80", video: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4" },
            { title: "Ocean Waves", category: "Nature", duration: "7s", ratio: "9:16", thumbnail: "https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=800&q=80", video: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4" }
        ];

        // App state variables
        let prompt = "";
        let duration = "5";
        let aspectRatio = "16:9";
        let generating = false;
        let videoReady = false;
        let activeVideo = null;
        let recentVideos = [];
        let user = { name: "Trial User", plan: "Trial", videosLeft: 3, totalVideos: 7 };
        let users = [
            { id: 1, name: "Alex Chen", plan: "Pro", videosLeft: 12, totalVideos: 48 },
            { id: 2, name: "Sam Rivera", plan: "Trial", videosLeft: 2, totalVideos: 5 },
            { id: 3, name: "Jordan Lee", plan: "Enterprise", videosLeft: 999, totalVideos: 120 }
        ];
        let progress = 0;
        let progressMsg = "";
        let genLog = "";
        let showUpgrade = false;

        // Helper functions for state updates
        const setProgress = (val) => { progress = val; updateUI(); };
        const setProgressMsg = (msg) => { progressMsg = msg; updateUI(); };
        const setGenLog = (msg) => { genLog = msg; updateUI(); };
        const setGenerating = (val) => { generating = val; updateUI(); };
        const setVideoReady = (val) => { videoReady = val; updateUI(); };
        const setActiveVideo = (video) => { activeVideo = video; updateUI(); };
        const setRecentVideos = (fn) => { recentVideos = fn(recentVideos); updateUI(); };
        const setUser = (newUser) => { user = newUser; updateUI(); };
        const setUsers = (fn) => { users = fn(users); updateUI(); };
        const setShowUpgrade = (val) => { showUpgrade = val; updateUI(); };

        // Initialize with demo data
        const initDemo = () => {
            if (recentVideos.length === 0) {
                setRecentVideos(prev => [...DEMO_VIDEOS]);
                setActiveVideo(DEMO_VIDEOS[0]);
            }
        };

        // Main generation function
        const handleGenerate = async () => {
            if (!prompt.trim() || generating) return;
            const isTrial = user.plan === "Trial";
            if (isTrial && user.videosLeft <= 0) { setShowUpgrade(true); return; }

            setGenerating(true);
            setVideoReady(false);
            setProgress(5);
            setGenLog("Submitting job to Fal.ai...");
            setProgressMsg("Submitting to Kling AI...");

            try {
                // Submit job to Fal.ai
                const submitRes = await fetch("/api/submit", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        prompt: prompt,
                        duration: isTrial ? "5" : duration,
                        aspect_ratio: aspectRatio
                    })
                });

                const submitData = await submitRes.json();
                if (!submitRes.ok) throw new Error(submitData.error || "Submit failed");

                const requestId = submitData.request_id;
                setGenLog(`Job submitted! ID: ${requestId}\nPolling every 5 seconds...`);
                setProgress(15);
                setProgressMsg("Job submitted, waiting for generation...");

                // Poll for result
                let attempts = 0;
                const maxAttempts = 60; // 5 minutes max
                const pollInterval = setInterval(async () => {
                    attempts++;
                    const prog = Math.min(15 + (attempts * 1.3), 90);
                    setProgress(Math.round(prog));

                    if (attempts < 10) setProgressMsg(`In queue... (${attempts*5}s)`);
                    else if (attempts < 25) setProgressMsg(`Generating frames... (${attempts*5}s)`);
                    else setProgressMsg(`Finalizing video... (${attempts*5}s)`);

                    try {
                        const pollRes = await fetch("/api/poll", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ request_id: requestId })
                        });
                        const pollData = await pollRes.json();
                        setGenLog(`Status: ${pollData.status} (attempt ${attempts})`);

                        if (pollData.status === "COMPLETED" && pollData.videoUrl) {
                            clearInterval(pollInterval);
                            setProgress(100);
                            setProgressMsg("Video Generated!");
                            setGenLog("Real AI Video Ready!");

                            const newItem = {
                                id: Date.now(),
                                title: prompt.slice(0, 30),
                                category: "Text‑to‑Video",
                                duration: (isTrial ? "5" : duration) + "s",
                                ratio: aspectRatio,
                                thumbnail: "https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=800&q=80",
                                video: pollData.videoUrl,
                                gradient: "from-emerald-500/30 to-cyan-600/30",
                                watermark: isTrial,
                                isReal: true
                            };
                            setActiveVideo(newItem);
                            setVideoReady(true);
                            setGenerating(false);
                            setRecentVideos(prev => [newItem, ...prev.slice(0, 5)]);

                            if (isTrial) {
                                const updatedUser = { ...user, videosLeft: user.videosLeft - 1, totalVideos: user.totalVideos + 1 };
                                setUser(updatedUser);
                                setUsers(prev => prev.map(u => u.id === user.id ? updatedUser : u));
                            }
                        }

                        if (pollData.status === "FAILED") {
                            clearInterval(pollInterval);
                            throw new Error("Video generation failed on Fal.ai");
                        }

                        if (attempts >= maxAttempts) {
                            clearInterval(pollInterval);
                            throw new Error("Timeout - took too long");
                        }
                    } catch (pollErr) {
                        clearInterval(pollInterval);
                        setGenerating(false);
                        setGenLog(`Error: ${pollErr.message}`);
                        setProgress(100);
                        setProgressMsg("Error occurred");
                    }
                }, 5000);

            } catch (err) {
                setGenerating(false);
                setGenLog(`Error: ${err.message}`);
                setProgress(100);
                setProgressMsg("Failed - showing demo");

                // Fallback demo video
                const base = DEMO_VIDEOS[Math.floor(Math.random() * DEMO_VIDEOS.length)];
                const newItem = {
                    id: Date.now(),
                    title: prompt.slice(0, 30),
                    category: "Demo",
                    duration: (isTrial ? "5" : duration) + "s",
                    ratio: aspectRatio,
                    thumbnail: base.thumbnail,
                    video: base.video,
                    gradient: "from-slate-500/30 to-gray-600/30",
                    watermark: isTrial,
                    isReal: false
                };
                setActiveVideo(newItem);
                setVideoReady(true);
                setRecentVideos(prev => [newItem, ...prev.slice(0, 5)]);
            }
        };

        // UI update function
        const updateUI = () => {
            const root = document.getElementById("root");
            if (!root) return;
            root.innerHTML = `
                <!-- Full UI HTML (the UI you already designed) -->
                <div class="min-h-screen grid-bg overflow-x-hidden">
                    <header class="px-6 py-4 border-b border-white/10 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-gradient-to-br from-purple-600 to-pink-500 rounded-lg"></div>
                            <h1 class="text-2xl font-bold gradient-text">LrAI Video Studio</h1>
                            <span class="text-sm font-medium px-3 py-1 bg-white/10 rounded-full">${user.plan}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="flex items-center gap-2">
                                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                                <span class="text-sm text-gray-300">API Connected</span>
                            </div>
                            <button onclick="location.reload()" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-sm transition">
                                Refresh
                            </button>
                        </div>
                    </header>

                    <main class="max-w-7xl mx-auto px-6 py-8">
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <!-- Left Panel - Controls -->
                            <div class="lg:col-span-2 space-y-8">
                                <div class="glass-card p-6 rounded-2xl">
                                    <h2 class="text-xl font-bold mb-4">Create AI Video</h2>
                                    <textarea 
                                        class="w-full p-4 bg-white/5 border border-white/10 rounded-xl resize-none focus:outline-none focus:ring-2 focus:ring-purple-500"
                                        rows="4"
                                        placeholder="Describe your video scene in detail... e.g., 'A futuristic city at sunset with flying cars, cinematic, 4K'"
                                        oninput="prompt = this.value"
                                    >${prompt}</textarea>
                                    <div class="flex flex-wrap gap-4 mt-6">
                                        <div>
                                            <label class="block text-sm text-gray-400 mb-2">Duration</label>
                                            <div class="flex gap-2">
                                                ${["5", "8", "10", "15"].map(d => `
                                                    <button 
                                                        onclick="duration='${d}'"
                                                        class="px-4 py-2 rounded-lg ${duration === d && !(user.plan === 'Trial' && d === '10') ? 'bg-gradient-to-r from-purple-600 to-pink-600' : 'bg-white/10 hover:bg-white/20'}"
                                                        ${user.plan === 'Trial' && d === '10' ? 'disabled style="opacity:0.5"' : ''}
                                                    >
                                                        ${d}s ${user.plan === 'Trial' && d === '10' ? '🔒' : ''}
                                                    </button>
                                                `).join('')}
                                            </div>
                                        </div>
                                        <div>
                                            <label class="block text-sm text-gray-400 mb-2">Aspect Ratio</label>
                                            <div class="flex gap-2">
                                                ${["16:9", "9:16", "1:1", "4:5"].map(r => `
                                                    <button 
                                                        onclick="aspectRatio='${r}'"
                                                        class="px-4 py-2 rounded-lg ${aspectRatio === r ? 'bg-gradient-to-r from-purple-600 to-pink-600' : 'bg-white/10 hover:bg-white/20'}"
                                                    >
                                                        ${r}
                                                    </button>
                                                `).join('')}
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mt-8">
                                        <button 
                                            onclick="handleGenerate()"
                                            class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 rounded-xl text-lg font-bold transition-all disabled:opacity-50"
                                            ${generating ? 'disabled' : ''}
                                        >
                                            ${generating ? '<div class="flex items-center justify-center gap-3"><div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> Generating AI Video...</div>' : 'Generate AI Video'}
                                        </button>
                                        ${generating ? `
                                            <div class="mt-6">
                                                <div class="flex justify-between text-sm mb-2">
                                                    <span>${progressMsg}</span>
                                                    <span>${progress}%</span>
                                                </div>
                                                <div class="h-2 bg-white/10 rounded-full overflow-hidden">
                                                    <div class="progress-bar" style="width:${progress}%"></div>
                                                </div>
                                            </div>
                                        ` : ''}
                                    </div>
                                </div>

                                <!-- Generation Log -->
                                ${generating ? `
                                    <div class="glass-card p-6 rounded-2xl">
                                        <h3 class="font-bold mb-3">Generation Log</h3>
                                        <pre class="text-sm bg-black/30 p-4 rounded-lg whitespace-pre-wrap max-h-60 overflow-auto">${genLog}</pre>
                                    </div>
                                ` : ''}

                                <!-- Active Video Player -->
                                ${activeVideo ? `
                                    <div class="glass-card p-6 rounded-2xl">
                                        <div class="flex justify-between items-center mb-4">
                                            <h3 class="text-xl font-bold">${activeVideo.title}</h3>
                                            <div class="flex items-center gap-3">
                                                <span class="px-3 py-1 text-sm rounded-full ${activeVideo.isReal ? 'bg-emerald-500/20 text-emerald-300' : 'bg-gray-500/20 text-gray-300'}">
                                                    ${activeVideo.isReal ? 'Real AI Video' : 'Demo Video'}
                                                </span>
                                                <span class="px-3 py-1 text-sm rounded-full bg-white/10">${activeVideo.duration}</span>
                                                <span class="px-3 py-1 text-sm rounded-full bg-white/10">${activeVideo.ratio}</span>
                                            </div>
                                        </div>
                                        <div class="relative rounded-xl overflow-hidden bg-black">
                                            ${videoReady ? `
                                                <video src="${activeVideo.video}" controls class="w-full" poster="${activeVideo.thumbnail}"></video>
                                            ` : `
                                                <div class="aspect-video flex items-center justify-center">
                                                    <div class="text-center">
                                                        <div class="w-16 h-16 border-4 border-white/20 border-t-white rounded-full animate-spin mx-auto mb-4"></div>
                                                        <p class="text-gray-400">Preparing video player...</p>
                                                    </div>
                                                </div>
                                            `}
                                            ${activeVideo.watermark ? `
                                                <div class="absolute bottom-4 right-4 px-3 py-1 bg-black/70 text-sm rounded">
                                                    Trial Watermark
                                                </div>
                                            ` : ''}
                                        </div>
                                        <div class="mt-4 flex justify-between">
                                            <button onclick="navigator.clipboard.writeText('${activeVideo.video}')" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg">
                                                Copy Video URL
                                            </button>
                                            <a href="${activeVideo.video}" target="_blank" class="px-4 py-2 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg">
                                                Download
                                            </a>
                                        </div>
                                    </div>
                                ` : ''}
                            </div>

                            <!-- Right Panel - Stats & Recent -->
                            <div class="space-y-8">
                                <!-- User Stats -->
                                <div class="glass-card p-6 rounded-2xl">
                                    <h3 class="text-xl font-bold mb-6">Your Studio</h3>
                                    <div class="space-y-4">
                                        <div class="flex justify-between">
                                            <span class="text-gray-400">Plan</span>
                                            <span class="font-bold">${user.plan}</span>
                                        </div>
                                        <div class="flex justify-between">
                                            <span class="text-gray-400">Videos Left</span>
                                            <span class="font-bold ${user.videosLeft <= 2 ? 'text-amber-400' : 'text-emerald-400'}">${user.videosLeft}</span>
                                        </div>
                                        <div class="flex justify-between">
                                            <span class="text-gray-400">Total Generated</span>
                                            <span class="font-bold">${user.totalVideos}</span>
                                        </div>
                                    </div>
                                    ${user.plan === 'Trial' && user.videosLeft < 3 ? `
                                        <button onclick="setShowUpgrade(true)" class="w-full mt-6 py-3 bg-gradient-to-r from-amber-600 to-orange-600 hover:from-amber-700 hover:to-orange-700 rounded-lg font-bold">
                                            Upgrade Plan (${user.videosLeft} left)
                                        </button>
                                    ` : ''}
                                </div>

                                <!-- Recent Videos -->
                                <div class="glass-card p-6 rounded-2xl">
                                    <h3 class="text-xl font-bold mb-6">Recent Videos</h3>
                                    <div class="space-y-4">
                                        ${recentVideos.length > 0 ? recentVideos.map(v => `
                                            <div class="flex items-center gap-4 p-3 bg-white/5 rounded-xl hover:bg-white/10 cursor-pointer" onclick="setActiveVideo(${JSON.stringify(v)})">
                                                <div class="w-16 h-12 rounded-lg bg-gradient-to-br ${v.gradient || 'from-gray-600 to-gray-800'}"></div>
                                                <div class="flex-1">
                                                    <div class="font-medium truncate">${v.title}</div>
                                                    <div class="text-sm text-gray-400 flex gap-3">
                                                        <span>${v.category}</span>
                                                        <span>${v.duration}</span>
                                                        <span>${v.ratio}</span>
                                                    </div>
                                                </div>
                                                ${v.isReal ? '<div class="w-2 h-2 bg-emerald-500 rounded-full"></div>' : ''}
                                            </div>
                                        `).join('') : `
                                            <p class="text-gray-500 text-center py-8">No recent videos yet</p>
                                        `}
                                    </div>
                                </div>

                                <!-- Users List -->
                                <div class="glass-card p-6 rounded-2xl">
                                    <h3 class="text-xl font-bold mb-6">Active Users</h3>
                                    <div class="space-y-4">
                                        ${users.map(u => `
                                            <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl">
                                                <div>
                                                    <div class="font-medium">${u.name}</div>
                                                    <div class="text-sm text-gray-400">${u.plan}</div>
                                                </div>
                                                <div class="text-right">
                                                    <div class="font-bold ${u.videosLeft < 5 ? 'text-amber-400' : 'text-emerald-400'}">${u.videosLeft} left</div>
                                                    <div class="text-sm text-gray-400">${u.totalVideos} total</div>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>

                <!-- Upgrade Modal -->
                ${showUpgrade ? `
                    <div class="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
                        <div class="glass-card p-8 rounded-2xl max-w-md w-full">
                            <h3 class="text-2xl font-bold mb-4">Upgrade Required</h3>
                            <p class="text-gray-300 mb-6">Your trial video quota has been used. Upgrade to continue generating real AI videos.</p>
                            <div class="space-y-4 mb-8">
                                <div class="p-4 border border-white/20 rounded-xl">
                                    <div class="font-bold text-lg">Pro Plan</div>
                                    <div class="text-3xl font-bold my-2">$19<span class="text-lg text-gray-400">/month</span></div>
                                    <ul class="text-gray-300 space-y-2">
                                        <li>✅ 50 videos/month</li>
                                        <li>✅ Up to 20s duration</li>
                                        <li>✅ No watermarks</li>
                                        <li>✅ Priority generation</li>
                                    </ul>
                                </div>
                            </div>
                            <div class="flex gap-4">
                                <button onclick="setShowUpgrade(false)" class="flex-1 py-3 bg-white/10 hover:bg-white/20 rounded-xl">
                                    Maybe Later
                                </button>
                                <button onclick="alert('Upgrade flow would open here');setShowUpgrade(false)" class="flex-1 py-3 bg-gradient-to-r from-purple-600 to-pink-600 rounded-xl font-bold">
                                    Upgrade Now
                                </button>
                            </div>
                        </div>
                    </div>
                ` : ''}
            `;
            // Reattach event listeners for any dynamic elements
            setTimeout(() => {
                const textarea = root.querySelector('textarea');
                if (textarea) textarea.value = prompt;
            }, 10);
        };

        // Initialize
        window.onload = () => {
            initDemo();
            updateUI();
        };
    </script>
</body>
</html>
